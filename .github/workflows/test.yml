name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk-version: ["22.0.0", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.sdk-version }}
      - name: Pin soroban-sdk to matrix version
        run: |
          sed -i 's/soroban-sdk = { version = "[^"]*"/soroban-sdk = { version = "${{ matrix.sdk-version }}"/g' \
            contracts/stream/Cargo.toml contracts/treasury/Cargo.toml
          cargo update -p soroban-sdk
      - name: Build WASM
        run: cargo build --target wasm32v1-none --release
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit tests
        run: cargo test --lib -- --skip proptest_tests --skip differential_fuzz --skip integration_tests

  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM
        run: cargo build --target wasm32v1-none --release
      - name: Property-based tests (10,000 iterations per property)
        run: cargo test proptest_tests -- --nocapture
        timeout-minutes: 30

  differential-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Differential fuzzing (1,000,000 iterations)
        run: cargo test differential_fuzz -- --nocapture
        timeout-minutes: 30

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM
        run: cargo build --target wasm32v1-none --release
      - name: Cross-contract integration tests
        run: cargo test integration_tests -- --nocapture
      - name: Testnet manifest validation
        run: cargo test testnet_manifest_loads -- --nocapture
      - name: Install Stellar CLI
        if: env.SOROSTREAM_TESTNET_CONTRACT != ''
        env:
          SOROSTREAM_TESTNET_CONTRACT: ${{ secrets.SOROSTREAM_TESTNET_CONTRACT }}
        run: cargo install --locked stellar-cli --features opt
      - name: Live testnet integration tests
        if: env.SOROSTREAM_TESTNET_CONTRACT != ''
        env:
          SOROSTREAM_TESTNET_CONTRACT: ${{ secrets.SOROSTREAM_TESTNET_CONTRACT }}
          SOROSTREAM_TESTNET_SOURCE: ${{ secrets.SOROSTREAM_TESTNET_SOURCE }}
        run: cargo test testnet_integration -- --ignored --nocapture
      - name: Test
        run: cargo test
      - name: Storage baseline regression check
        run: cargo test --package sorostream-stream -- storage_bench::check_storage_baseline_regression --nocapture
      - name: Build size-optimized WASM
        run: cargo build --target wasm32v1-none --profile release-size
      - name: Record WASM binary size
        id: wasm_size
        run: |
          SIZE=$(wc -c < target/wasm32v1-none/release/sorostream_stream.wasm)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "WASM binary size: $SIZE bytes"
      - name: Check WASM size regression
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          git checkout origin/main -- wasm-size.log 2>/dev/null || echo "0" > wasm-size.log
          BASELINE=$(cat wasm-size.log | tr -d '[:space:]')
          CURRENT=${{ steps.wasm_size.outputs.size }}
          if [ "$BASELINE" -gt 0 ] 2>/dev/null; then
            GROWTH=$(( (CURRENT - BASELINE) * 100 / BASELINE ))
            echo "Baseline: $BASELINE bytes, Current: $CURRENT bytes, Growth: ${GROWTH}%"
            if [ "$GROWTH" -gt 5 ]; then
              echo "::error::WASM binary grew by ${GROWTH}% (>${BASELINE} -> ${CURRENT}), exceeding the 5% threshold"
              exit 1
            fi
          else
            echo "No baseline size found, skipping regression check"
          fi
